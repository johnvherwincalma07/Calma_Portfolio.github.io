<!DOCTYPE html>
<html>
<head>
<title>Quizzes</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="sidebar">
  <h2>Your Name</h2>
  <a href="index.html">🏠 Home</a>
  <a href="activities.html">📂 Activities</a>
  <a href="quizzes.html">📝 Quizzes</a>
</div>

<div class="main">
<header class="topbar">
  <h2>Quizzes</h2>
</header>

<section class="grid">
  <div class="card">
    <h3>Quiz 1</h3>
    <p>⭐ <span class="score" data-score="95">0</span>%</p>
    <button onclick="like(this)">Like</button>
    <button onclick="openModal('Quiz 1 details')">View</button>
  </div>

  <div class="card">
    <h3>Quiz 2</h3>
    <p>⭐ <span class="score" data-score="90">0</span>%</p>
    <button onclick="like(this)">Like</button>
    <button onclick="openModal('Quiz 2 details')">View</button>
  </div>
</section>
</div>

<div id="modal" class="modal">
  <div class="modal-box">
    <span onclick="closeModal()">✖</span>
    <p id="modal-text"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
