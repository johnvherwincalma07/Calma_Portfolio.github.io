<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzes - Hero Dashboard</title>
    <link rel="stylesheet" href="s.css">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="profile-container">
        <img src="profile.jpg" alt="Player Avatar" class="profile-img">
    </div>
    <h2 class="title-font">JOHN VHERWIN CALMA</h2>
    <h5 class="rubik-font">BS INFOTECH 402C</h5>
    <nav class="game-menu">
        <a href="index.html" class="nav-item">🏠 HOME BASE</a>
        <a href="activities.html" class="nav-item">📂 ACTIVITIES</a>
        <a href="quizzes.html" class="nav-item" style="background: var(--magenta);">📝 QUIZZES</a>
    </nav>
</div>

<div class="main" id="main">
    <header class="topbar glass">
        <div class="topbar-left">
            <h3 class="title-font">CHALLENGE: QUIZZES</h3>
        </div>
        <div class="topbar-right">
            <a href="index.html" class="game-button magenta-btn rubik-font" style="width: auto; padding: 5px 15px;">BACK</a>
        </div>
    </header>

    <section class="hero text-center">
        <h1 class="title-font big-title">QUIZ ARCHIVE</h1>
        <p class="rubik-font subtitle">Review your knowledge and scores.</p>
    </section>

    <section class="grid">
        
        <div class="game-card">
            <div class="card-icon magenta-icon"><i class="fa-solid fa-bolt"></i></div>
            <h3 class="title-font">Quiz #1</h3>
            <p class="rubik-font">Database Fundamentals <br> Score: 20/20</p>
            
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <a href="#" class="game-button cyan-btn" style="font-size: 0.8rem; padding: 10px;">REVIEW</a>
                
                <button class="game-button magenta-btn" onclick="openModal('quiz1-modal')" style="font-size: 0.8rem; padding: 10px; cursor: pointer;">
                    <i class="fa-solid fa-circle-plus"></i> PROOF
                </button>
            </div>
        </div>

        </section>
</div>

<div id="quiz1-modal" class="game-modal">
    <div class="modal-content glass">
        <span class="close-btn" onclick="closeModal('quiz1-modal')">&times;</span>
        <h2 class="title-font" style="color: var(--cyan);">MISSION COMPLETE!</h2>
        <hr style="border: 1px solid rgba(255,255,255,0.1); margin: 15px 0;">
        
        <div class="screenshot-container">
            <img src="quiz1-ss.jpg" alt="Quiz 1 Screenshot" class="screenshot">
        </div>
        
        <p class="rubik-font" style="margin-top: 15px; font-weight: bold;">
            <i class="fa-solid fa-award" style="color: var(--gold);"></i> 
            Authenticity Verified: Perfect Score Achieved!
        </p>
    </div>
</div>

<script>
    function openModal(modalId) {
        document.getElementById(modalId).style.display = "block";
        document.body.style.overflow = "hidden"; // Stops background scrolling
    }

    function closeModal(modalId) {
        document.getElementById(modalId).style.display = "none";
        document.body.style.overflow = "auto"; // Enables scrolling again
    }

    // Close modal if user clicks outside the content box
    window.onclick = function(event) {
        if (event.target.className === "game-modal") {
            event.target.style.display = "none";
            document.body.style.overflow = "auto";
        }
    }
</script>

</body>
</html>
